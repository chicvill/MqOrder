<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>통계 - {{ store.name }}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-header { padding: 1.2rem 1.2rem 0.5rem; }
        .stats-header h1 { font-size: 1.5rem; font-weight: 800; }

        .s-period-selector {
            display: flex;
            padding: 0.5rem 1.2rem;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .s-period-selector::-webkit-scrollbar { display: none; }
        .s-period-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1.1rem;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
        }
        .s-period-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .s-content { padding: 1.2rem; }

        .s-rev-card {
            background: var(--accent);
            border-radius: var(--radius-lg);
            padding: 1.6rem 1.4rem;
            color: #fff;
            margin-bottom: 1.2rem;
            position: relative;
            overflow: hidden;
        }
        .s-rev-card::after {
            content: '\f201';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 8rem;
            opacity: 0.1;
        }
        .s-rev-label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; margin-bottom: 4px; }
        .s-rev-amount { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .s-rev-sub { font-size: 0.75rem; opacity: 0.8; margin-top: 8px; }

        .s-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.2rem; }
        .s-mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
        }
        .sm-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
        .sm-value { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .best-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .best-row {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .best-row:last-child { border-bottom: none; }
        .br-idx { width: 20px; font-size: 0.8rem; font-weight: 700; color: var(--accent); }
        .br-name { flex: 1; font-size: 0.9rem; font-weight: 700; margin-left: 8px; }
        .br-val { font-size: 0.9rem; font-weight: 800; color: var(--text-dim); }
    </style>
</head>
<body class="nav-body">
{% from 'macros/bottom_nav.html' import bottom_nav %}

<div class="app-shell">
    <div class="stats-header">
        <h1>통계 분석</h1>
    </div>

    <!-- 기간 선택 -->
    <div class="s-period-selector">
        <div class="s-period-btn active" onclick="changePeriod('today', this)">오늘</div>
        <div class="s-period-btn" onclick="changePeriod('week', this)">주간</div>
        <div class="s-period-btn" onclick="changePeriod('month', this)">월간</div>
        <div class="s-period-btn" onclick="changePeriod('year', this)">연간</div>
    </div>

    <div class="s-content">
        <!-- 메인 매출 카드 -->
        <div class="s-rev-card">
            <div class="s-rev-label" id="rev-label">오늘 총 매출</div>
            <div class="s-rev-amount" id="rev-total">0원</div>
            <div class="s-rev-sub" id="rev-date">조회 기준: 오늘</div>
        </div>

        <div class="s-grid">
            <div class="s-mini-card">
                <div class="sm-label">주문 건수</div>
                <div class="sm-value" id="ord-count">0건</div>
            </div>
            <div class="s-mini-card">
                <div class="sm-label">신규 회원</div>
                <div class="sm-value" id="new-cust">0명</div>
            </div>
        </div>

        <div class="section-header">
            <span class="section-title">판매량 추이</span>
        </div>
        <div class="chart-box">
            <canvas id="salesChart" style="max-height: 220px;"></canvas>
        </div>

        <div class="section-header">
            <span class="section-title">인기 메뉴 TOP 5</span>
        </div>
        <div class="best-list" id="best-list">
            <!-- JS -->
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 0.6rem;">
            <button class="btn btn-secondary btn-sm" onclick="window.print()" style="flex:1;">
                <i class="fa-solid fa-file-pdf"></i> 리포트 저장
            </button>
            <button class="btn btn-secondary btn-sm" onclick="resetStats()" style="flex:1; border-color: rgba(239,68,68,0.3); color: var(--danger);">
                <i class="fa-solid fa-trash"></i> 통계 초기화
            </button>
        </div>
    </div>

    <footer style="padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.72rem;">
        고급 분석 기능을 위해 MQnet Pro 구독을 고려해보세요.
    </footer>
</div>

{{ bottom_nav(active='stats', store_id=store.id) }}

<script>
    const STORE_ID = "{{ store.id }}";
    let currentPeriod = 'today';
    let chart = null;

    async function changePeriod(p, btn) {
        currentPeriod = p;
        document.querySelectorAll('.s-period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const labels = {'today': '오늘 총 매출', 'week': '주간 매출 합계', 'month': '월간 매출 합계', 'year': '연간 매출 합계'};
        document.getElementById('rev-label').textContent = labels[p];
        document.getElementById('rev-date').textContent = `조회 기준: ${labels[p].split(' ')[0]}`;
        
        loadStats();
    }

    async function loadStats() {
        try {
            const res = await fetch(`/api/${STORE_ID}/stats?period=${currentPeriod}`);
            const data = await res.json();

            document.getElementById('rev-total').textContent = (data.sales || 0).toLocaleString() + '원';
            
            const bestList = document.getElementById('best-list');
            bestList.innerHTML = '';
            const menus = data.best_menu || [];
            if (menus.length === 0) {
                bestList.innerHTML = '<div style="padding:2rem; text-align:center; color:var(--text-muted); font-size:0.85rem;">데이터 없음</div>';
            } else {
                menus.forEach((m, i) => {
                    const row = document.createElement('div');
                    row.className = 'best-row';
                    row.innerHTML = `
                        <div class="br-idx">${i+1}</div>
                        <div class="br-name">${m.name}</div>
                        <div class="br-val">${m.count}개</div>
                    `;
                    bestList.appendChild(row);
                });
            }

            // 추가 정보 (주문건수 등 - stats api 수정 필요 시 대비)
            // 현재 api/stats 에 건수가 없으면 store.py 보강 필요.
            // 여기서는 임시로 chip 데이터 등 활용 가능.

            updateChart(menus);
        } catch(e) {}
    }

    function updateChart(menus) {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: menus.map(m => m.name),
                datasets: [{
                    label: '판매량',
                    data: menus.map(m => m.count),
                    backgroundColor: '#f97316',
                    borderRadius: 6,
                    barThickness: 20
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a1a1aa' } },
                    x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    async function resetStats() {
        if (!confirm('정말 통계 데이터를 초기화하시겠습니까? (결제 내역은 유지됩니다)')) return;
        try {
            await fetch(`/api/${STORE_ID}/stats/reset`, { method: 'POST' });
            loadStats();
        } catch(e) {}
    }

    window.onload = loadStats;
</script>
</body>
</html>
