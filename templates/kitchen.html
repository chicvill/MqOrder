<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>주방 - {{ store.name }}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .kitchen-title {
            padding: 1.2rem 1.2rem 0.5rem;
            font-size: 1.5rem;
            font-weight: 800;
        }
        /* 3탭 탭바 */
        .k-tabs {
            display: flex;
            padding: 0 0.8rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        .k-tab {
            flex: 1;
            padding: 0.9rem 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .k-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .k-content { padding: 0 1.2rem 1.2rem; }

        /* 주방 카드 스타일 (가로형) */
        .k-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .k-card.delayed { border-color: rgba(239, 68, 68, 0.4); }

        .k-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .k-table-id {
            font-size: 1.1rem;
            font-weight: 800;
        }
        .k-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .k-time.delayed { color: var(--danger); font-weight: 700; }

        .k-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .k-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .k-item-name { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .k-item-qty  { font-size: 1.6rem; font-weight: 900; color: var(--accent); }

        .k-actions {
            display: flex;
            gap: 0.6rem;
        }
        .k-btn {
            flex: 1;
            padding: 0.9rem;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="nav-body"> <!-- 바텀 네비 필요시 대비 -->

<div class="app-shell">
    <div class="kitchen-title">주방 대시보드</div>

    <div class="k-tabs">
        <div class="k-tab active" id="tab-new" onclick="switchTab('new')">주문 수락</div>
        <div class="k-tab" id="tab-cooking" onclick="switchTab('cooking')">조리 중</div>
        <div class="k-tab" id="tab-ready" onclick="switchTab('ready')">조리 완료</div>
    </div>

    <div class="k-content" id="k-container">
        <div class="empty-state" style="padding:4rem 0; text-align:center; color:var(--text-muted);">
            <i class="fa-solid fa-fire fa-spin-pulse" style="font-size:3rem; margin-bottom:1rem; display:block;"></i>
            주문을 불러오는 중...
        </div>
    </div>
</div>

<!-- 알림음 -->
<audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const STORE_ID = "{{ store.id }}";
    const socket = io();
    let currentTab = 'new';
    let orders = [];

    socket.on('connect', () => {
        socket.emit('join', { store_id: STORE_ID });
        loadOrders();
    });

    socket.on('new_order', () => {
        document.getElementById('chime').play().catch(()=>{});
        loadOrders();
    });
    socket.on('order_status_update', loadOrders);

    async function loadOrders() {
        try {
            const res = await fetch(`/api/${STORE_ID}/orders`);
            orders = await res.json();
            render();
        } catch(e) {}
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.k-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        render();
    }

    function render() {
        const container = document.getElementById('k-container');
        container.innerHTML = '';

        let filtered = [];
        if (currentTab === 'new') {
            filtered = orders.filter(o => o.status === 'pending');
        } else if (currentTab === 'cooking') {
            filtered = orders.filter(o => o.status === 'pending'); // 임시: pending을 조리중으로도 표시
        } else if (currentTab === 'ready') {
            filtered = orders.filter(o => o.status === 'ready');
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div style="padding:5rem 2rem; text-align:center; color:var(--text-muted);"><i class="fa-solid fa-check-double" style="font-size:3rem; margin-bottom:1rem; display:block; opacity:0.3;"></i>대기 중인 주문이 없습니다</div>`;
            return;
        }

        filtered.forEach(o => {
            const card = document.createElement('div');
            const diff = o.created_at ? (new Date() - new Date(o.created_at)) / 60000 : 0;
            const isDelayed = diff > 15;
            card.className = `k-card animate-fade-up ${isDelayed ? 'delayed' : ''}`;
            
            const itemsHtml = (o.items || []).map(i => `
                <div class="k-item-row">
                    <span class="k-item-name">${i.name}</span>
                    <span class="k-item-qty">x${i.quantity}</span>
                </div>
            `).join('');

            let actionBtn = '';
            if (currentTab === 'new') {
                actionBtn = `<button class="k-btn btn-primary" style="background:#d97706;" onclick="updateStatus('${o.id}', 'cooking')">조리 시작</button>`;
            } else if (currentTab === 'cooking' || currentTab === 'new') {
                actionBtn = `<button class="k-btn btn-primary" onclick="updateStatus('${o.id}', 'ready')">조리 완료</button>`;
            }

            card.innerHTML = `
                <div class="k-card-header">
                    <div class="k-table-id">#${o.table_id} 테이블</div>
                    <div class="k-time ${isDelayed ? 'delayed' : ''}">${Math.floor(diff)}분 경과</div>
                </div>
                <div class="k-items">${itemsHtml}</div>
                <div class="k-actions">${actionBtn}</div>
            `;
            container.appendChild(card);
        });
    }

    function updateStatus(orderId, status) {
        if (status === 'ready') {
            socket.emit('set_ready', { store_id: STORE_ID, order_id: orderId });
        } else {
            // 이외 상태는 간단히 클라이언트 사이드 filter or API 연동
            // 현재 서버 models/sockets 에는 set_ready 위주로 구현됨
            socket.emit('order_status_update', { id: orderId, status: status });
        }
        setTimeout(loadOrders, 300);
    }

    setInterval(loadOrders, 20000);
</script>
</body>
</html>
