<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>로그인 - MQnet</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(249, 115, 22, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(249, 115, 22, 0.05), transparent 300px);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-out;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px var(--accent-dim));
        }
        .login-logo h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
        .login-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.4rem; }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .input-group input {
            padding-left: 3.2rem !important;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-fire-glow"></i>
            <h1>MQnet</h1>
            <p>미래형 매장 운영의 시작</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="status-chip" style="background:rgba(239,68,68,0.1); color:var(--danger); width:100%; border:1px solid rgba(239,68,68,0.2); justify-content:center; margin-bottom:1.5rem; padding:0.8rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="post" class="auth-form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="아이디" required autofocus>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="비밀번호" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="padding:1rem; font-size:1rem; margin-top:0.5rem;">로그인</button>
        </form>

        <div class="auth-footer">
            계정이 없으신가요? <a href="/signup">회원가입 신청</a>
        </div>
    </div>
</body>
</html>
