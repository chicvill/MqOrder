<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호출 현황 - {{ store.name }}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .display-header {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }
        .display-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--text-dim); }
        .display-header .brand { font-size: 2.2rem; font-weight: 800; color: var(--accent); }

        .display-main {
            flex: 1;
            display: flex;
        }

        .display-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem 4rem;
        }
        .display-column.left { border-right: 2px solid rgba(255,255,255,0.05); }

        .column-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 3rem;
            color: var(--text-muted);
            text-align: center;
        }
        .column-title.highlight { color: var(--accent); }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }
        .number-card {
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            animation: fadeIn 0.5s ease-out;
        }
        .number-card.calling {
            background: var(--accent-dim);
            color: var(--accent);
            border: 2px solid var(--border-accent);
            animation: pulse-orange 2s infinite;
        }

        .footer-banner {
            padding: 2rem;
            background: var(--bg-card);
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="display-header">
        <h1>고객 호출 시스템</h1>
        <div class="brand">{{ store.name }}</div>
    </div>

    <div class="display-main">
        <!-- 준비 중 -->
        <div class="display-column left">
            <div class="column-title">준비 중인 번호</div>
            <div class="number-grid" id="grid-processing">
                <!-- <div class="number-card">102</div> -->
            </div>
        </div>

        <!-- 불러드리는 번호 -->
        <div class="display-column">
            <div class="column-title highlight">불러드리는 번호</div>
            <div class="number-grid" id="grid-calling">
                <!-- <div class="number-card calling">101</div> -->
            </div>
        </div>
    </div>

    <div class="footer-banner" id="footer-msg">
        주문하신 음식이 준비되면 번호를 불러드립니다. 잠시만 기다려주세요.
    </div>

    <!-- 알림음 -->
    <audio id="dingdong" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const STORE_ID = "{{ store.id }}";
        const socket = io();
        let lastCallingCount = 0;

        socket.on('connect', () => {
            socket.emit('join', { store_id: STORE_ID });
            refresh();
        });

        socket.on('order_status_update', refresh);
        socket.on('new_order', refresh);

        async function refresh() {
            try {
                const res = await fetch(`/api/${STORE_ID}/orders`);
                const orders = await res.json();
                
                const processing = orders.filter(o => o.status === 'pending').map(o => o.table_id || o.waiting_no || '?');
                const calling = orders.filter(o => o.status === 'ready').map(o => o.table_id || o.waiting_no || '?');

                renderGrid('grid-processing', processing, false);
                renderGrid('grid-calling', calling, true);

                if (calling.length > lastCallingCount) {
                    document.getElementById('dingdong').play().catch(()=>{});
                }
                lastCallingCount = calling.length;
            } catch(e) {}
        }

        function renderGrid(id, nums, isCalling) {
            const el = document.getElementById(id);
            el.innerHTML = nums.slice(0, 8).map(n => `
                <div class="number-card ${isCalling ? 'calling' : ''}">${n}</div>
            `).join('');
        }

        // 30초마다 강제 갱신
        setInterval(refresh, 30000);
    </script>
</body>
</html>
