<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>카운터 - {{ store.name }}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
    /* --- 음성 인식 고도화 (Antigravity Style) --- */
    .mic-section {
        position: fixed;
        bottom: 120px;
        right: 1.5rem;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
    .mgr-mic-btn {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        color: #fff;
        font-size: 1.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(255, 107, 0, 0.4);
        transition: transform 0.2s;
        position: relative;
    }
    .mgr-mic-btn:active { transform: scale(0.9); }
    .mgr-mic-btn.listening {
        animation: pulse-orange-heavy 1.5s infinite;
    }
    @keyframes pulse-orange-heavy {
        0% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.7), 0 10px 30px rgba(255, 107, 0, 0.4); }
        70% { box-shadow: 0 0 0 20px rgba(255, 107, 0, 0), 0 10px 30px rgba(255, 107, 0, 0.4); }
        100% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0), 0 10px 30px rgba(255, 107, 0, 0.4); }
    }
    .voice-caption {
        background: rgba(0,0,0,0.8);
        color: var(--accent);
        padding: 6px 15px;
        border-radius: 100px;
        font-size: 0.8rem;
        font-weight: 800;
        border: 1px solid var(--accent);
        display: none;
        white-space: nowrap;
    }
    </style>
</head>
<body class="nav-body">
{% from 'macros/bottom_nav.html' import bottom_nav %}

<div class="app-shell">
    <div class="counter-header">
        <h1>카운터</h1>
        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">{{ store.name }}</div>
    </div>

    <!-- 4탭 메뉴 -->
    <div class="counter-tabs">
        <div class="counter-tab active" onclick="switchTab('new')" id="tab-new">
            신규 주문 <span class="badge-count" id="cnt-new">0</span>
        </div>
        <div class="counter-tab" onclick="switchTab('cooking')" id="tab-cooking">
            조리 중 <span class="badge-count" id="cnt-cooking">0</span>
        </div>
        <div class="counter-tab" onclick="switchTab('ready')" id="tab-ready">
            서빙 대기 <span class="badge-count" id="cnt-ready">0</span>
        </div>
        <div class="counter-tab" onclick="switchTab('waiting')" id="tab-waiting">
            대기자 <span class="badge-count blue" id="cnt-waiting">0</span>
        </div>
    </div>

    <!-- 주문 목록 영역 -->
    <div class="order-content" id="order-container">
        <div class="empty-state">
            <i class="fa-solid fa-clipboard-list"></i>
            주문을 불러오는 중...
        </div>
    </div>
    <!-- Premium Voice Section -->
    <div class="mic-section">
        <div id="mgr-caption" class="voice-caption">듣고 있어요...</div>
        <button class="mgr-mic-btn" id="mgr-mic-btn">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>
</div>

{{ bottom_nav(active='counter', store_id=store.id) }}

<script>
    const STORE_ID = "{{ store.id }}";
    const socket = io();
    let currentTab = 'new';
    let allOrders = [];
    let waitingList = [];

    socket.on('connect', () => {
        socket.emit('join', { store_id: STORE_ID });
        refreshAll();
    });

    socket.on('new_order', refreshAll);
    socket.on('order_status_update', refreshAll);
    socket.on('waiting_update', refreshAll);

    async function refreshAll() {
        await Promise.all([loadOrders(), loadWaiting(), loadCounts()]);
        render();
    }

    async function loadCounts() {
        try {
            const res = await fetch(`/api/${STORE_ID}/home-stats`);
            const d = await res.json();
            document.getElementById('cnt-new').textContent = d.new_orders || 0;
            document.getElementById('cnt-cooking').textContent = d.cooking || 0;
            document.getElementById('cnt-ready').textContent = d.serving_ready || 0;
            document.getElementById('cnt-waiting').textContent = d.waiting || 0;
        } catch(e) {}
    }

    async function loadOrders() {
        try {
            const res = await fetch(`/api/${STORE_ID}/orders`);
            allOrders = await res.json();
        } catch(e) { allOrders = []; }
    }

    async function loadWaiting() {
        try {
            const res = await fetch(`/api/${STORE_ID}/waiting/list`);
            waitingList = await res.json();
        } catch(e) { waitingList = []; }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.counter-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        render();
    }

    function render() {
        const container = document.getElementById('order-container');
        container.innerHTML = '';

        let filtered = [];
        if (currentTab === 'new') {
            filtered = allOrders.filter(o => o.status === 'pending');
        } else if (currentTab === 'cooking') {
            filtered = allOrders.filter(o => o.status === 'pending'); // 임시: pending을 조리중으로도 표시 (kitchen 연동 전)
        } else if (currentTab === 'ready') {
            filtered = allOrders.filter(o => o.status === 'ready');
        } else if (currentTab === 'waiting') {
            return renderWaiting(container);
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-check-circle" style="color:var(--accent);opacity:0.6;"></i>${currentTab === 'ready' ? '서빙 대기 중인 주문이 없습니다' : '진행 중인 주문이 없습니다'}</div>`;
            return;
        }

        filtered.forEach(o => {
            const card = document.createElement('div');
            // 지연 주문 처리 (예: 10분 넘으면 delayed)
            const diff = o.created_at ? (new Date() - new Date(o.created_at)) / 1000 / 60 : 0;
            const isDelayed = diff > 10;
            card.className = `order-card animate-fade-up ${isDelayed ? 'delayed' : ''}`;
            
            const itemsHtml = (o.items || []).map(i => `
                <div class="order-item-row">
                    <span>${i.name}</span>
                    <span>x${i.quantity}</span>
                </div>
            `).join('');

            let actionBtn = '';
            if (o.status === 'pending') {
                actionBtn = `<button class="btn btn-primary btn-cook-start" onclick="updateStatus('${o.id}', 'ready')">조리 완료</button>`;
            } else if (o.status === 'ready') {
                actionBtn = `<button class="btn btn-primary btn-serve-done" onclick="updateStatus('${o.id}', 'paid')">서빙 완료</button>`;
            }

            card.innerHTML = `
                <div class="order-card-header">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div class="table-badge ${o.status === 'ready' ? 'serving' : 'new'}">${o.table_id}</div>
                        <div class="fw-800">${o.table_id}번 테이블</div>
                    </div>
                    <div class="order-price">${(o.total_price || 0).toLocaleString()}원</div>
                </div>
                <div class="order-time ${isDelayed ? 'delayed' : ''}">
                    ${isDelayed ? '<i class="fa-solid fa-triangle-exclamation"></i> ' : ''}
                    ${Math.floor(diff)}분 전 ${isDelayed ? '· 지연' : ''}
                </div>
                <div class="order-items mt-1">
                    ${itemsHtml}
                </div>
                <div class="order-actions">
                    ${actionBtn}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderWaiting(container) {
        if (waitingList.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i>대기 중인 손님이 없습니다</div>`;
            return;
        }

        waitingList.forEach((w, idx) => {
            const card = document.createElement('div');
            card.className = 'order-card animate-fade-up waiting-card';
            
            card.innerHTML = `
                <div class="waiting-info">
                    <div class="wi-name">
                        <span class="text-orange" style="margin-right:8px;">${w.waiting_no}번 대기</span>
                        ${w.people}명
                    </div>
                    <div class="wi-sub">
                        ${w.phone || '미입력'} · ${w.waiting_time || idx*10}분 대기 중
                    </div>
                </div>
                <button class="btn btn-primary btn-sm btn-admit" onclick="enterWaiting(${w.id})">입실</button>
            `;
            container.appendChild(card);
        });
    }

    async function updateStatus(orderId, status) {
        if (status === 'ready') {
             socket.emit('set_ready', { store_id: STORE_ID, order_id: orderId });
        } else if (status === 'paid') {
             socket.emit('set_paid', { store_id: STORE_ID, order_id: orderId });
        }
        setTimeout(refreshAll, 300);
    }

    async function enterWaiting(waitId) {
        try {
            const res = await fetch(`/api/${STORE_ID}/waiting/enter/${waitId}`, { method: 'POST' });
            if (res.ok) refreshAll();
        } catch(e) {}
    }

    // --- 음성 인식 고도화 (Antigravity Logic) ---
    let recognition;
    const micBtn = document.getElementById('mgr-mic-btn');
    const cap = document.getElementById('mgr-caption');
    
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'ko-KR';
        recognition.interimResults = true;

        recognition.onstart = () => {
            micBtn.classList.add('listening');
            cap.innerText = '듣고 있어요...';
            cap.style.display = 'block';
        };
        recognition.onend = () => {
            micBtn.classList.remove('listening');
            setTimeout(() => { if(!micBtn.classList.contains('listening')) cap.style.display = 'none'; }, 2000);
        };
        recognition.onresult = (event) => {
            let interim = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    handleVoiceCommand(event.results[i][0].transcript);
                } else {
                    interim += event.results[i][0].transcript;
                }
            }
            if(interim) cap.innerText = interim;
        };
    }

    micBtn.onclick = () => {
        if (recognition) {
            if (micBtn.classList.contains('listening')) recognition.stop();
            else recognition.start();
        } else alert('이 브라우저는 음성 인식을 지원하지 않습니다.');
    };

    async function handleVoiceCommand(text) {
        cap.innerText = `"${text}"`;
        try {
            // [고도화] 일반 Q&A 대신 시스템 제어 API 호출
            const res = await fetch(`/api/${STORE_ID}/management-order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: text,
                    visible_info: document.body.innerText.substring(0, 500)
                })
            });
            const data = await res.json();
            
            if (data.reply) {
                const uttr = new SpeechSynthesisUtterance(data.reply);
                uttr.lang = 'ko-KR';
                window.speechSynthesis.speak(uttr);
                cap.innerText = data.reply;
            }

            if (data.action && data.action.type === 'navigate' && data.action.url) {
                setTimeout(() => { location.href = data.action.url; }, 1200);
            }
        } catch(e) {
            cap.innerText = "명령 처리 중 오류가 발생했습니다.";
        }
    }

    setInterval(refreshAll, 15000); // 15초 자동 갱신
</script>
</body>
</html>
